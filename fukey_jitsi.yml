AWSTemplateFormatVersion: "2010-09-09"
Description: Fukey Education Jitsi Installation

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0c204e5a43508e57d

  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-08446724a220161ec

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - qa
      - prod

  IAMRole:
    Type: String
    Default: FukeyEducationEC2Jitsi

  StaticSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Default: sg-03d9fe8fbb0a4c7c0

Mappings:
  InstanceTypes:
    ap-south-1:
      dev: t2.micro
      qa: t2.small
      prod: t3.xlarge

  AMIIDs:
    ap-south-1:
      dev: ami-0b525e61305c23c46
      qa: ami-0b525e61305c23c46
      prod: ami-0b525e61305c23c46

  FukeyEducationKeyName:
    ap-south-1:
      dev: Jitsi
      qa: Jitsi
      prod: Jitsi

Resources:
  WakeUpAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref FukeyEducationAutoScalingGroup
      ScheduledActionName: ScaleUpDaily
      Recurrence: "30 9 * * *"
      TimeZone: "Asia/Kolkata"
      DesiredCapacity: 1
      MinSize: 1
      MaxSize: 1

  ShutdownAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref FukeyEducationAutoScalingGroup
      ScheduledActionName: ScaleDownDaily
      Recurrence: "30 10 * * *"
      TimeZone: "Asia/Kolkata"
      DesiredCapacity: 0
      MinSize: 0
      MaxSize: 0
      
  # 3. Application Load Balancer
  FukeyEducationApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets: !Ref Subnets
      SecurityGroups: !Ref StaticSecurityGroupIds

  # 1. Define the ALB Target Group
  FukeyEducationTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: "FukeyEducationTargetGroup"
      Protocol: HTTPS
      Port: 443
      VpcId: !Ref VpcId # Reference an existing VPC logical ID or parameter
      HealthCheckPath: /
      HealthCheckProtocol: HTTPS
      TargetType: instance
      Name: !Sub '${AWS::StackName}-TG'
      # other properties like HealthCheckIntervalSeconds, HealthyThresholdCount, etc.

  FukeyEducationAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref Subnets
      LaunchTemplate:
        LaunchTemplateId: !Ref FukeyEducationLaunchTemplate
        Version: !GetAtt FukeyEducationLaunchTemplate.LatestVersionNumber
      MinSize: '5'
      MaxSize: '7'
      DesiredCapacity: '5'
      TargetGroupARNs:
        - !Ref FukeyEducationTargetGroup # Reference the logical ID of the target group

  # 3. Define an ALB Listener and associated rules to forward traffic to the Target Group
  # The Listener is associated with the ALB, which then uses the Target Group
  FukeyEducationALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref FukeyEducationApplicationLoadBalancer
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FukeyEducationTargetGroup
      Port: 443
      Protocol: HTTPS
      Certificates:
      - CertificateArn: "arn:aws:acm:ap-south-1:543583415208:certificate/45f32c5b-2e8b-4cb0-89fa-bb72becb4c85"

  FukeyEducationLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${AWS::StackName}-AdvancedTemplate
      LaunchTemplateData:
        ImageId:
          Fn::FindInMap:
            - AMIIDs
            - !Ref AWS::Region
            - !Ref Environment

        InstanceType:
          Fn::FindInMap:
            - InstanceTypes
            - !Ref AWS::Region
            - !Ref Environment

        KeyName:
          Fn::FindInMap:
            - FukeyEducationKeyName
            - !Ref AWS::Region
            - !Ref Environment

        SecurityGroupIds: !Ref StaticSecurityGroupIds

        IamInstanceProfile:
          Arn: !GetAtt FukeyEducationInstanceProfile.Arn

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            apt update -y
            apt install -y docker.io docker-compose git python3-pip
            systemctl enable docker
            systemctl start docker

            sleep 10

            python3 -m venv /opt/my_env
            source /opt/my_env/bin/activate

            cd /opt
            git clone https://github.com/himanshub2101/Jitsi-FukeyEducation.git
            cd /opt/Jitsi-FukeyEducation

            cp env.example .env
            ./gen-passwords.sh

            cat <<EOF >> .env
            PUBLIC_URL=https://meet.fukeyeducation.com
            ENABLE_AUTH=0
            ENABLE_GUESTS=1
            TZ=Asia/Kolkata
            EOF

            docker-compose up -d

  FukeyEducationInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

Outputs:
  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt FukeyEducationApplicationLoadBalancer.DNSName
